<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机甲对决 - 像素风机甲对战</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0a12;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
}

.game-wrapper {
  position: relative;
  border: 4px solid #2a2a4a;
  box-shadow:
    0 0 30px rgba(100, 60, 255, 0.3),
    inset 0 0 20px rgba(0, 0, 0, 0.5);
}

canvas {
  display: block;
  width: 960px;
  height: 540px;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

@media (max-width: 1000px) {
  canvas {
    width: 100vw;
    height: 56.25vw;
    max-height: 100vh;
    max-width: 177.78vh;
  }
}
</style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 960;
const H = 540;
canvas.width = W;
canvas.height = H;

const SCALE = 3;
const LOGIC_W = W / SCALE;
const LOGIC_H = H / SCALE;
const GROUND_Y = LOGIC_H - 40;

const GRAVITY = 0.6;
const FRICTION = 0.85;

const STATE = { TITLE: 0, PLAYING: 1, GAME_OVER: 2 };

let gameState = STATE.TITLE;
let gameTime = 0;
let hitSparks = [];
let dustParticles = [];
let shakeX = 0;
let shakeY = 0;
let shakeTimer = 0;
let winner = null;

const keys = {};

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (gameState === STATE.TITLE || gameState === STATE.GAME_OVER) {
    if (e.key === ' ' || e.key === 'Enter') {
      resetGame();
    }
  }
  e.preventDefault();
});

document.addEventListener('keyup', e => {
  keys[e.key] = false;
  e.preventDefault();
});

const P1_KEYS = { left: 'a', right: 'd', jump: 'w', attack: 's', defense: 'q' };
const P2_KEYS = { left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp', attack: 'ArrowDown', defense: '/' };

const MECHA_COLORS = {
  p1: {
    primary: '#e05030',
    secondary: '#ff7040',
    accent: '#ffcc00',
    dark: '#8b2010',
    visor: '#00ffcc',
    joint: '#c0c0c0',
    highlight: '#ff9060'
  },
  p2: {
    primary: '#2060d0',
    secondary: '#4080ff',
    accent: '#00ffcc',
    dark: '#103080',
    visor: '#ffcc00',
    joint: '#c0c0c0',
    highlight: '#60a0ff'
  }
};

function createMecha(x, colorSet, facing, keyset, name) {
  return {
    x, y: GROUND_Y,
    vx: 0, vy: 0,
    w: 16, h: 24,
    hp: 100,
    maxHp: 100,
    color: colorSet,
    facing,
    keys: keyset,
    name,
    state: 'idle',
    stateTimer: 0,
    animFrame: 0,
    animTimer: 0,
    attackCooldown: 0,
    isDefending: false,
    isGrounded: true,
    hitTimer: 0,
    comboCount: 0,
    canMove: true
  };
}

let mecha1, mecha2;

function resetGame(fromTitle) {
  if (!fromTitle) {
    gameState = STATE.PLAYING;
  }
  winner = null;
  gameTime = 0;
  hitSparks = [];
  dustParticles = [];
  shakeX = 0;
  shakeY = 0;
  shakeTimer = 0;
  mecha1 = createMecha(LOGIC_W * 0.25, MECHA_COLORS.p1, 1, P1_KEYS, '机甲·赤焰');
  mecha2 = createMecha(LOGIC_W * 0.75, MECHA_COLORS.p2, -1, P2_KEYS, '机甲·冰霜');
}

function isKeyPressed(key) {
  return keys[key] === true;
}

function updateMecha(m, dt) {
  if (m.hp <= 0) return;

  m.attackCooldown = Math.max(0, m.attackCooldown - dt);
  m.hitTimer = Math.max(0, m.hitTimer - dt);
  m.stateTimer = Math.max(0, m.stateTimer - dt);
  m.animTimer += dt;

  if (m.animTimer > 0.12) {
    m.animTimer = 0;
    m.animFrame = (m.animFrame + 1) % 4;
  }

  const left = isKeyPressed(m.keys.left);
  const right = isKeyPressed(m.keys.right);
  const jump = isKeyPressed(m.keys.jump);
  const attack = isKeyPressed(m.keys.attack);
  const defense = isKeyPressed(m.keys.defense);

  if (m.hitTimer > 0) {
    m.state = 'hit';
    return;
  }

  if (attack && m.attackCooldown <= 0 && m.isGrounded) {
    m.state = 'attacking';
    m.attackCooldown = 0.5;
    m.stateTimer = 0.3;
    m.animFrame = 0;
    doAttack(m);
    return;
  }

  if (m.stateTimer > 0) {
    return;
  }

  if (defense && m.isGrounded) {
    m.isDefending = true;
    m.state = 'defending';
    m.vx *= 0.7;
  } else {
    m.isDefending = false;
    if (m.state === 'defending') m.state = 'idle';
  }

  if (left) {
    m.vx = -3;
    m.facing = -1;
    if (m.isGrounded && !m.isDefending) m.state = 'running';
  } else if (right) {
    m.vx = 3;
    m.facing = 1;
    if (m.isGrounded && !m.isDefending) m.state = 'running';
  } else {
    if (m.isGrounded && !m.isDefending) m.state = 'idle';
    m.vx *= FRICTION;
    if (Math.abs(m.vx) < 0.1) m.vx = 0;
  }

  if (jump && m.isGrounded) {
    m.vy = -8;
    m.isGrounded = false;
    m.state = 'jumping';
    spawnDust(m.x + m.w / 2, GROUND_Y + 4, m.color.primary);
  }

  if (!m.isGrounded) {
    m.state = 'jumping';
  }

  m.vy += GRAVITY;
  m.x += m.vx;
  m.y += m.vy;

  if (m.y >= GROUND_Y) {
    m.y = GROUND_Y;
    m.vy = 0;
    if (!m.isGrounded) {
      m.isGrounded = true;
      spawnDust(m.x + m.w / 2, GROUND_Y + 4, m.color.primary);
    }
  }

  m.x = Math.max(10, Math.min(LOGIC_W - 10 - m.w, m.x));
}

function doAttack(attacker) {
  const other = (attacker === mecha1) ? mecha2 : mecha1;
  let ax, ay, aw, ah;

  if (attacker.facing > 0) {
    ax = attacker.x + attacker.w;
    ay = attacker.y + 4;
    aw = 12;
    ah = 10;
  } else {
    ax = attacker.x - 12;
    ay = attacker.y + 4;
    aw = 12;
    ah = 10;
  }

  const ox = other.x;
  const oy = other.y + 4;
  const ow = other.w;
  const oh = 10;

  if (ax < ox + ow && ax + aw > ox && ay < oy + oh && ay + ah > oy) {
    if (other.hitTimer > 0) return;

    let damage = 10;
    if (other.isDefending) {
      damage = 5;
      spawnSparks(other.x + other.w / 2, other.y + 8, '#00ffff', 8);
    } else {
      spawnSparks(other.x + other.w / 2, other.y + 8, '#ffffff', 12);
    }

    other.hp = Math.max(0, other.hp - damage);
    other.hitTimer = 0.3;
    other.vx = attacker.facing * 4;

    shakeTimer = 0.15;
    shakeX = attacker.facing * 2;
    shakeY = -2;

    if (other.hp <= 0) {
      winner = (attacker === mecha1) ? mecha1 : mecha2;
      setTimeout(() => { gameState = STATE.GAME_OVER; }, 500);
    }
  }
}

function spawnSparks(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    hitSparks.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 0.4 + Math.random() * 0.3,
      maxLife: 0.4 + Math.random() * 0.3,
      color,
      size: 1 + Math.random() * 2
    });
  }
}

function spawnDust(x, y, color) {
  for (let i = 0; i < 4; i++) {
    dustParticles.push({
      x, y,
      vx: (Math.random() - 0.5) * 2,
      vy: -Math.random() * 1.5 - 0.5,
      life: 0.3 + Math.random() * 0.3,
      maxLife: 0.3 + Math.random() * 0.3,
      color,
      size: 1 + Math.random() * 2
    });
  }
}

function updateParticles(dt) {
  for (let i = hitSparks.length - 1; i >= 0; i--) {
    const p = hitSparks[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= dt;
    if (p.life <= 0) hitSparks.splice(i, 1);
  }
  for (let i = dustParticles.length - 1; i >= 0; i--) {
    const p = dustParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.03;
    p.life -= dt;
    if (p.life <= 0) dustParticles.splice(i, 1);
  }
}

function getAnimOffset(m) {
  if (m.state === 'idle') {
    return Math.sin(gameTime * 3) * 0.3;
  }
  if (m.state === 'running') {
    return Math.sin(m.animFrame * Math.PI / 2) * 0.5;
  }
  if (m.state === 'hit') {
    return (Math.random() - 0.5) * 1.5;
  }
  return 0;
}

function drawMecha(m) {
  const s = SCALE;
  const cx = m.x * s + m.w * s / 2;
  const cy = m.y * s;
  const dir = m.facing;

  ctx.save();
  ctx.translate(cx, cy);

  const bob = getAnimOffset(m);
  ctx.translate(0, bob * s);

  const pw = m.w * s;
  const ph = m.h * s;
  const c = m.color;
  const flash = m.hitTimer > 0 && Math.floor(m.hitTimer * 30) % 4 < 2;

  if (flash) {
    ctx.globalAlpha = 0.7;
  }

  const ps = s;
  const W2 = pw;

  const isAttacking = m.state === 'attacking';
  const isDefending = m.state === 'defending';
  const isJumping = m.state === 'jumping';
  const isRunning = m.state === 'running';
  const runCycle = Math.sin(m.animFrame * Math.PI / 2);

  ctx.save();

  if (dir < 0) {
    ctx.scale(-1, 1);
  }

  const headY = -ph + 2 * ps;

  if (isAttacking) {
    drawAttackEffect(ctx, W2 / 2 + 10 * ps, headY + 6 * ps, ps, c.accent);
  }

  if (isDefending) {
    ctx.save();
    ctx.globalAlpha = 0.3 + Math.sin(gameTime * 8) * 0.15;
    ctx.fillStyle = c.accent;
    ctx.fillRect(0, headY + 4 * ps, 4 * ps, 10 * ps);
    ctx.restore();
  }

  const sh = ph;

  let bodyOffY = 0;
  let legOffX = 0;
  let armSwing = 0;
  if (isRunning) {
    bodyOffY = Math.abs(runCycle) * 0.5 * ps;
    legOffX = runCycle * 1.5 * ps;
    armSwing = runCycle * 2 * ps;
  }

  const bx = W2 / 2;

  ctx.fillStyle = c.dark;
  ctx.fillRect(bx - 3 * ps, headY + 7 * ps + bodyOffY, 6 * ps, 10 * ps);

  ctx.fillStyle = c.joint;
  ctx.fillRect(bx - 4 * ps, headY + 6 * ps + bodyOffY, 2 * ps, 2 * ps);
  ctx.fillRect(bx + 2 * ps, headY + 6 * ps + bodyOffY, 2 * ps, 2 * ps);

  ctx.fillStyle = c.primary;
  ctx.fillRect(bx - 5 * ps, headY + 8 * ps + bodyOffY, 10 * ps, 8 * ps);

  ctx.fillStyle = c.highlight;
  ctx.fillRect(bx - 3 * ps, headY + 8 * ps + bodyOffY, 2 * ps, 6 * ps);
  ctx.fillRect(bx + 1 * ps, headY + 8 * ps + bodyOffY, 2 * ps, 6 * ps);

  ctx.fillStyle = c.secondary;
  ctx.fillRect(bx - 4 * ps, headY + 10 * ps + bodyOffY, 8 * ps, 4 * ps);

  ctx.fillStyle = c.joint;
  ctx.fillRect(bx - 2 * ps, headY + 12 * ps + bodyOffY, 4 * ps, 2 * ps);

  ctx.fillStyle = c.primary;
  ctx.fillRect(bx - 6 * ps, headY + bodyOffY, 12 * ps, 7 * ps);

  ctx.fillStyle = c.dark;
  ctx.fillRect(bx - 5 * ps, headY + bodyOffY, 2 * ps, 7 * ps);
  ctx.fillRect(bx + 3 * ps, headY + bodyOffY, 2 * ps, 7 * ps);

  ctx.fillStyle = c.joint;
  ctx.fillRect(bx - 4 * ps, headY + 3 * ps, 8 * ps, 2 * ps);

  const visorColor = flash ? '#ffffff' : c.visor;
  ctx.fillStyle = visorColor;
  ctx.fillRect(bx - 3 * ps, headY + 1 * ps, 6 * ps, 3 * ps);

  ctx.fillStyle = '#000000';
  ctx.fillRect(bx - 1 * ps, headY + 1 * ps, 2 * ps, 3 * ps);

  if (c.visor === '#00ffcc') {
    ctx.fillStyle = '#00ffcc';
  } else {
    ctx.fillStyle = '#ffcc00';
  }
  ctx.fillRect(bx - 1 * ps, headY + 1 * ps, 1 * ps, 1 * ps);
  ctx.fillRect(bx + 1 * ps, headY + 2 * ps, 1 * ps, 1 * ps);

  const shoulderY = headY + 6 * ps + bodyOffY;

  ctx.fillStyle = c.secondary;
  ctx.fillRect(bx - 8 * ps, shoulderY, 3 * ps, 3 * ps);
  ctx.fillRect(bx + 5 * ps, shoulderY, 3 * ps, 3 * ps);

  ctx.fillStyle = c.primary;
  ctx.fillRect(bx - 7 * ps, shoulderY + 3 * ps, 2 * ps, 4 * ps);
  ctx.fillRect(bx + 5 * ps, shoulderY + 3 * ps, 2 * ps, 4 * ps);

  ctx.fillStyle = c.joint;

  let leftArmX, rightArmX;
  if (isAttacking) {
    leftArmX = bx - 7 * ps + armSwing;
    rightArmX = bx + 7 * ps + armSwing;
  } else {
    leftArmX = bx - 6 * ps + armSwing;
    rightArmX = bx + 6 * ps + armSwing;
  }

  ctx.fillRect(leftArmX, shoulderY + 7 * ps, 2 * ps, 2 * ps);
  ctx.fillRect(rightArmX, shoulderY + 7 * ps, 2 * ps, 2 * ps);

  const legY = headY + 16 * ps + bodyOffY;
  let leftLegX = bx - 3 * ps + legOffX;
  let rightLegX = bx + 1 * ps - legOffX;

  if (isJumping) {
    leftLegX = bx - 4 * ps;
    rightLegX = bx + 2 * ps;
  }

  if (isDefending) {
    leftLegX = bx - 3 * ps;
    rightLegX = bx + 1 * ps;
  }

  ctx.fillStyle = c.primary;
  ctx.fillRect(leftLegX, legY, 3 * ps, 5 * ps);
  ctx.fillRect(rightLegX, legY, 3 * ps, 5 * ps);

  ctx.fillStyle = c.dark;
  ctx.fillRect(leftLegX, legY + 5 * ps, 3 * ps, 2 * ps);
  ctx.fillRect(rightLegX, legY + 5 * ps, 3 * ps, 2 * ps);

  ctx.fillStyle = c.secondary;
  ctx.fillRect(leftLegX - 1 * ps, legY + 6 * ps, 4 * ps, 1 * ps);
  ctx.fillRect(rightLegX - 1 * ps, legY + 6 * ps, 4 * ps, 1 * ps);

  ctx.restore();
  ctx.restore();
}

function drawAttackEffect(ctx, x, y, ps, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.8;

  for (let i = 0; i < 3; i++) {
    const ox = (Math.random() - 0.5) * 4 * ps;
    const oy = (Math.random() - 0.5) * 2 * ps;
    const size = 2 + Math.random() * 3;
    ctx.globalAlpha = 0.4 + Math.random() * 0.4;
    ctx.fillRect(x + ox - size * ps / 2, y + oy - size * ps / 2, size * ps, size * ps);
  }

  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = 0.7;
  ctx.fillRect(x + 4 * ps, y - ps, 4 * ps, 2 * ps);
  ctx.fillRect(x + 6 * ps, y - 2 * ps, 2 * ps, 4 * ps);

  ctx.restore();
}

const stars = [];
for (let i = 0; i < 60; i++) {
  stars.push({
    x: Math.random() * LOGIC_W,
    y: Math.random() * (LOGIC_H * 0.5),
    size: 0.5 + Math.random() * 1.5,
    twinkle: Math.random() * Math.PI * 2
  });
}

const buildings = [];
for (let i = 0; i < 8; i++) {
  buildings.push({
    x: 20 + i * 55 + Math.random() * 20,
    w: 25 + Math.random() * 35,
    h: 30 + Math.random() * 60,
    color: `hsl(${220 + Math.random() * 30}, 20%, ${10 + Math.random() * 10}%)`
  });
}

const groundTiles = [];
for (let i = 0; i < 40; i++) {
  groundTiles.push({
    x: i * 24,
    shade: Math.random() > 0.5 ? '#2a2a3a' : '#22223a',
    hasLine: Math.random() > 0.6
  });
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, LOGIC_H);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(0.4, '#12102a');
  grad.addColorStop(0.7, '#1a1535');
  grad.addColorStop(1, '#2a1a3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, LOGIC_W, LOGIC_H);

  for (const star of stars) {
    const bright = 0.4 + Math.sin(gameTime * 0.5 + star.twinkle) * 0.3;
    ctx.fillStyle = `rgba(255, 255, 255, ${bright})`;
    ctx.fillRect(star.x, star.y, star.size, star.size);
  }

  const moonX = LOGIC_W * 0.8;
  const moonY = LOGIC_H * 0.15;
  ctx.fillStyle = '#c0c0d0';
  ctx.fillRect(moonX, moonY, 12, 12);
  ctx.fillRect(moonX + 2, moonY - 2, 8, 4);
  ctx.fillRect(moonX + 4, moonY + 2, 4, 8);
  ctx.fillStyle = '#9090a8';
  ctx.fillRect(moonX + 3, moonY + 3, 3, 3);
  ctx.fillRect(moonX + 7, moonY + 6, 2, 2);
  ctx.fillRect(moonX + 5, moonY + 8, 2, 2);

  ctx.fillStyle = '#15152a';
  for (const b of buildings) {
    ctx.fillRect(b.x, LOGIC_H - 45 - b.h + 5, b.w, b.h);
    for (let wy = 0; wy < b.h; wy += 8) {
      for (let wx = 0; wx < b.w; wx += 8) {
        if (Math.random() > 0.3) {
          ctx.fillStyle = `rgba(255, 200, 100, ${0.1 + Math.random() * 0.15})`;
          ctx.fillRect(b.x + wx + 2, LOGIC_H - 45 - b.h + 5 + wy + 2, 3, 3);
        }
      }
    }
    ctx.fillStyle = '#15152a';
  }

  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, LOGIC_H - 42, LOGIC_W, 6);

  ctx.fillStyle = '#1a1a2e';
  for (const tile of groundTiles) {
    ctx.fillStyle = tile.shade;
    ctx.fillRect(tile.x, LOGIC_H - 36, 24, 36);
    if (tile.hasLine) {
      ctx.fillStyle = '#1a1a30';
      ctx.fillRect(tile.x + 12, LOGIC_H - 36, 1, 36);
    }
  }

  ctx.fillStyle = '#3a3a5a';
  ctx.fillRect(0, LOGIC_H - 37, LOGIC_W, 1);
  ctx.fillStyle = '#2a2a4a';
  ctx.fillRect(0, LOGIC_H - 36, LOGIC_W, 1);

  ctx.fillStyle = '#4a4a6a';
  for (let i = 0; i < LOGIC_W; i += 48) {
    ctx.fillRect(i, LOGIC_H - 36, 24, 2);
  }

  ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
  for (let i = 0; i < LOGIC_W; i += 12) {
    ctx.fillRect(i, LOGIC_H - 34, 6, 1);
  }
}

function drawHUD() {
  const m1 = mecha1, m2 = mecha2;

  drawHPBar(30, 20, 180, 12, m1.hp, m1.maxHp, '#e05030', '#ff7040', m1.name);
  drawHPBar(W / SCALE - 210, 20, 180, 12, m2.hp, m2.maxHp, '#2060d0', '#4080ff', m2.name);

  ctx.fillStyle = '#ffffff';
  ctx.font = '5px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText(`${m1.hp}/${m1.maxHp}`, 30, 48);
  ctx.textAlign = 'right';
  ctx.fillText(`${m2.hp}/${m2.maxHp}`, W / SCALE - 30, 48);

  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(LOGIC_W / 2 - 30, 8, 60, 16);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '5px "Press Start 2P"';
  ctx.textAlign = 'center';
  const timeStr = Math.floor(gameTime / 60).toString().padStart(2, '0');
  ctx.fillText(timeStr, LOGIC_W / 2, 20);
}

function drawHPBar(x, y, w, h, current, max, color1, color2, name) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);

  ctx.fillStyle = '#1a0a0a';
  ctx.fillRect(x, y, w, h);

  const ratio = Math.max(0, current / max);
  const barW = Math.max(0, (w - 2) * ratio);

  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, color1);
  grad.addColorStop(1, color2);
  ctx.fillStyle = grad;
  ctx.fillRect(x + 1, y + 1, barW, h - 2);

  if (ratio > 0.3) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(x + 2, y + 1, barW - 2, 3);
  }

  ctx.fillStyle = '#ffffff';
  ctx.font = '5px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText(name, x, y - 4);

  if (current <= 20 && current > 0) {
    if (Math.floor(gameTime * 10) % 6 < 3) {
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(x + 1, y + 1, barW, h - 2);
    }
  }
}

function drawTitleScreen() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, LOGIC_W, LOGIC_H);

  for (const star of stars) {
    const bright = 0.4 + Math.sin(gameTime * 0.5 + star.twinkle) * 0.3;
    ctx.fillStyle = `rgba(255, 255, 255, ${bright})`;
    ctx.fillRect(star.x, star.y, star.size, star.size);
  }

  ctx.fillStyle = '#15152a';
  for (const b of buildings) {
    ctx.fillRect(b.x, LOGIC_H - b.h, b.w, b.h);
    ctx.fillStyle = '#15152a';
  }

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, LOGIC_H - 36, LOGIC_W, 36);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff4060';
  ctx.font = '16px "Press Start 2P"';
  ctx.fillText('机 甲 对 决', LOGIC_W / 2, LOGIC_H * 0.3);

  ctx.fillStyle = '#00ffcc';
  ctx.font = '6px "Press Start 2P"';
  ctx.fillText('MECHA DUEL', LOGIC_W / 2, LOGIC_H * 0.3 + 24);

  const blink = Math.floor(gameTime * 4) % 2 === 0;
  if (blink) {
    ctx.fillStyle = '#ffffff';
    ctx.font = '6px "Press Start 2P"';
    ctx.fillText('按 SPACE 开始', LOGIC_W / 2, LOGIC_H * 0.55);
  }

  ctx.fillStyle = '#c0c0c0';
  ctx.font = '4px "Press Start 2P"';
  ctx.fillText('— 操作说明 —', LOGIC_W / 2, LOGIC_H * 0.65);

  const controls = [
    { p1: 'A / D', p2: '← / →', action: '移动' },
    { p1: 'W', p2: '↑', action: '跳跃' },
    { p1: 'S', p2: '↓', action: '攻击' },
    { p1: 'Q', p2: '/', action: '防御' },
  ];

  ctx.font = '4px "Press Start 2P"';
  const startY = LOGIC_H * 0.72;
  ctx.fillStyle = '#ff7040';
  ctx.fillText('P1 赤焰', LOGIC_W / 2 - 80, startY);
  ctx.fillStyle = '#4080ff';
  ctx.fillText('P2 冰霜', LOGIC_W / 2 + 80, startY);

  controls.forEach((c, i) => {
    const y = startY + 14 + i * 12;
    ctx.fillStyle = '#ff7040';
    ctx.textAlign = 'right';
    ctx.fillText(c.p1, LOGIC_W / 2 - 10, y);
    ctx.fillStyle = '#888888';
    ctx.textAlign = 'center';
    ctx.fillText(c.action, LOGIC_W / 2, y);
    ctx.fillStyle = '#4080ff';
    ctx.textAlign = 'left';
    ctx.fillText(c.p2, LOGIC_W / 2 + 10, y);
  });
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, LOGIC_W, LOGIC_H);

  ctx.textAlign = 'center';

  if (winner) {
    const isP1 = winner === mecha1;

    ctx.strokeStyle = isP1 ? '#ff4060' : '#4080ff';
    ctx.lineWidth = 2;
    ctx.strokeRect(LOGIC_W / 2 - 80, LOGIC_H * 0.3 - 10, 160, 50);

    ctx.fillStyle = isP1 ? '#ff4060' : '#4080ff';
    ctx.font = '12px "Press Start 2P"';
    ctx.fillText('胜 利！', LOGIC_W / 2, LOGIC_H * 0.38);

    ctx.fillStyle = '#ffffff';
    ctx.font = '6px "Press Start 2P"';
    ctx.fillText(winner.name, LOGIC_W / 2, LOGIC_H * 0.5);
  }

  const blink = Math.floor(gameTime * 4) % 2 === 0;
  if (blink) {
    ctx.fillStyle = '#888888';
    ctx.font = '5px "Press Start 2P"';
    ctx.fillText('按 SPACE 重新开始', LOGIC_W / 2, LOGIC_H * 0.7);
  }
}

function drawDebugHUD() {
  ctx.fillStyle = '#ffffff';
  ctx.font = '4px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText(`FPS: ${Math.round(1 / (gameTime - (window._lastTime || 0)))}`, 5, LOGIC_H - 5);
  window._lastTime = gameTime;
}

function update(dt) {
  gameTime += dt;

  if (gameState === STATE.PLAYING) {
    updateMecha(mecha1, dt);
    updateMecha(mecha2, dt);
    updateParticles(dt);

    if (shakeTimer > 0) {
      shakeTimer -= dt;
      if (shakeTimer <= 0) {
        shakeX = 0;
        shakeY = 0;
      }
    }
  }
}

function render() {
  ctx.save();

  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeX * 2;
    const sy = (Math.random() - 0.5) * shakeY * 2;
    ctx.translate(sx, sy);
  }

  if (gameState === STATE.TITLE) {
    drawBackground();
    drawTitleScreen();
  } else if (gameState === STATE.PLAYING || gameState === STATE.GAME_OVER) {
    drawBackground();
    drawMecha(mecha1);
    drawMecha(mecha2);

    for (const p of hitSparks) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    for (const p of dustParticles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = (p.life / p.maxLife) * 0.5;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    drawHUD();

    if (gameState === STATE.GAME_OVER) {
      drawGameOver();
    }
  }

  ctx.restore();
}

let lastTime = 0;

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

resetGame(true);
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
